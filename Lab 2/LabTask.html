<html>
<head>
    <link rel="stylesheet" type="text/css" href="Style.css">
</head>

<body>

    <h1>Welcome to Pental Shop</h1>

    <h2>About This Lab</h2>

    <p>
        In this lab, you will learn basic HTML structure, formatting text,
        creating simple tables, and using forms for input.
    </p>

    <table border="1">
        <tr class="table-header">
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Status</th>
        </tr>

        <tr class="table-data">
            <td>Pencils</td>
            <td>100</td>
            <td>In Stock</td>
        </tr>

        <tr class="table-data">
            <td>Notebooks</td>
            <td>50</td>
            <td>Low Stock</td>
        </tr>

        <tr class="table-data">
            <td>Markers</td>
            <td>15</td>
            <td>In Stock</td>
        </tr>
    </table>

    <div class="contact">
        <h2>Contact Information</h2>

        <form>
            <table>
                <tr>
                    <td>Name</td>
                    <td><input type="text"></td>
                </tr>

                <tr>
                    <td>Email</td>
                    <td><input type="email"></td>
                </tr>

                <tr>
                    <td>Message</td>
                    <td><textarea rows="4"></textarea></td>
                </tr>

                <tr>
                    <td></td>
                    <td>
                        <button type="submit">Submit</button>
                    </td>
                </tr>
            </table>
        </form>
    </div>

</body>
</html>
